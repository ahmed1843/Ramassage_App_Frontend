<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - New Déchets</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <header>
    <h1>Connexion</h1>
  </header>

  <main class="p-5">
    <!-- UN SEUL FORMULAIRE PROPRE -->
    <form id="login-form" class="auth-form bg-white p-6 rounded-card shadow-md">
      <div class="mb-4">
        <label for="email" class="block font-bold mb-1">Email :</label>
        <input type="email" id="email" placeholder="test@test.com" required class="w-full p-3 border rounded">
      </div>

      <div class="mb-6">
        <label for="password" class="block font-bold mb-1">Mot de passe :</label>
        <input type="password" id="password" placeholder="••••••••" required class="w-full p-3 border rounded">
      </div>

      <button type="submit" class="bg-primary text-white font-bold py-3 w-full rounded-xl">
        Se connecter
      </button>
      
      <p id="login-error" style="color: red; display: none; margin-top: 15px; text-align: center;"></p>
    </form>

    <div id="login-confirmation" class="hidden text-center mt-4">
      ✅ Connexion réussie ! Bienvenue.
    </div>
  </main>

  <footer class="text-center mt-10">
    <p>Pas encore inscrit ? <a href="register.html" class="text-primary font-bold">Créer un compte</a></p>
    <p class="mt-2"><a href="index.html">← Retour à l'accueil</a></p>
  </footer>

  <script src="login.js"></script>
</body>
</html>
