<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Déchets - Accueil</title>
  
  <script src="config.js"></script>
  <link rel="stylesheet" href="style.css" />

 <style>
footer.mobile-nav {
    position: fixed; /* 👈 CHANGE CECI (était static) */
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 85px;
    background-color: white;
    border-top: 1px solid #eeeeee;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
    z-index: 999999;
    display: flex; 
    align-items: center;
    padding: 0;
    margin: 0;
}

/* Ajoute ceci pour que la balise <nav> à l'intérieur prenne toute la place */
footer.mobile-nav nav {
    width: 100%;
}


  .nav-list {
      display: flex !important;
      width: 100% !important;
      justify-content: space-around !important;
      list-style: none !important;
      padding: 0 !important;
      margin: 0 !important;
  }

  .nav-item a {
      text-decoration: none !important;
      color: #7f8c8d !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      gap: 4px !important;
      font-size: 26px !important;
  }

  .nav-item a span {
      font-size: 13px !important;
      font-weight: 700 !important;
  }

  .nav-item a.active {
      color: #27ae60 !important;
  }

  /* --- TRÈS IMPORTANT : CRÉER UN VIDE EN BAS DE LA PAGE --- */
  main {
      padding-bottom: 120px !important; /* Empêche le menu de cacher ton contenu */
  }

  @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>

</head>

<body>
  <header>
    <h1>New Déchets</h1>
  </header>

  <main class="p-5 flex flex-col gap-6">
    <section id="auth-section" class="auth-options"></section>

    <div id="eco-tip-container" style="background: #e8f5e9; border-left: 5px solid #2ecc71; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <span style="font-size: 24px;">🌱</span>
        <div>
            <strong style="color: #2e7d32; font-size: 13px; display: block;">Conseil Éco-Citoyen</strong>
            <p id="eco-tip-text" style="margin: 0; font-size: 14px; color: #1b5e20;">Chargement du conseil...</p>
        </div>
    </div>

    <input type="text" id="search-zone" placeholder="Rechercher une zone (ex: Médina)..." class="w-full p-3 border rounded-xl shadow-sm">

    <section id="zones-container" class="flex flex-col gap-4">
        <p class="text-center">Chargement des zones...</p>
    </section>

    <section class="next-pickup bg-white p-5 rounded-card shadow-sm text-center">
      <h2 class="text-primary font-bold">Prochain passage :</h2>
      <p id="pickup-time" class="text-lg font-bold my-3">Chargement...</p>
      <button class="calendar-btn w-full py-3 bg-secondary text-white rounded-lg" onclick="window.location.href='calendrier.html'">Voir le calendrier</button>
    </section>

    <section id="stats-section" class="stats-section" style="display: none; padding: 10px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0; font-size: 16px; font-weight: bold; color: #2c3e50;">État des Zones</h2>
          <button onclick="rafraichirStats()" id="btn-refresh" style="background: #f8f9fa; border: 1px solid #eee; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 11px; color: #7f8c8d; display: flex; align-items: center; gap: 4px; width: auto; white-space: nowrap;">
              <span>🔄</span> Actualiser
          </button>
      </div>
      <div id="stats-container">Chargement...</div>
    </section>
  </main>

  <!-- LE FOOTER EST BIEN DANS LE BODY MAINTENANT -->
<footer class="mobile-nav">
  <nav>
    <ul class="nav-list">
      <li class="nav-item"><a href="index.html">🏠<span>Accueil</span></a></li>
      <li class="nav-item"><a href="notifications.html">🔔<span>Notifs</span></a></li>
      <li class="nav-item"><a href="signalement.html">📢<span>Signaler</span></a></li>
      <li class="nav-item"><a href="contact.html">❓<span>Aide</span></a></li>
      <li class="nav-item"><a href="profil.html">👤<span>Profil</span></a></li>
    </ul>
  </nav>
</footer>

  <script src="script.js"></script>

  <!-- MODAL DE DÉCONNEXION -->
  <div id="logout-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:20000; align-items:center; justify-content:center; backdrop-filter: blur(6px);">
      <div id="modal-content" style="background:white; width:90%; max-width:340px; padding:30px; border-radius:24px; text-align:center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
          <div style="font-size:50px; margin-bottom:15px;">👋</div>
          <h2 style="margin:0 0 10px 0; color:#2c3e50; font-size:22px;">Déconnexion</h2>
          <p style="color:#7f8c8d; font-size:15px; margin-bottom:30px; line-height:1.5;">Voulez-vous vraiment vous<br><b style="color:#333;">déconnecter ?</b></p>
          <div style="display:flex; flex-direction:column; gap:12px;">
              <button onclick="validerDeconnexion()" style="width:100%; padding:14px; border-radius:14px; border:none; background:#e74c3c; color:white; cursor:pointer; font-weight:bold; font-size:16px;">Oui, se déconnecter</button>
              <button onclick="fermerModal()" style="width:100%; padding:14px; border-radius:14px; border:1px solid #eee; background:#f8f9fa; color:#7f8c8d; cursor:pointer; font-weight:bold; font-size:15px;">Annuler</button>
          </div>
      </div>
  </div>
</body>
</html>
